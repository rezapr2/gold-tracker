version: '3.9'

# Production topology. Secrets come from a root .env (MONGO_ROOT_*, REDIS_PASSWORD,
# API keys, telegram tokens, JWT/admin, NEXT_PUBLIC_*). Core owns MongoDB; the
# other services reach data over RabbitMQ.

x-svc-common: &svc-common
  restart: always
  env_file: ./.env
  networks: [gold-network]

x-rabbit-env: &rabbit-env
  RABBITMQ_URL: amqp://rabbitmq:5672
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  NODE_ENV: production

services:
  mongodb:
    image: mongo:7-jammy
    container_name: gold-tracker-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: gold-tracker
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks: [gold-network]
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gold-tracker-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [gold-network]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gold-tracker-rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [gold-network]
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5

  core:
    <<: *svc-common
    build: { context: ., dockerfile: apps/core/Dockerfile, target: run }
    container_name: gold-tracker-core
    environment:
      <<: *rabbit-env
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/gold-tracker?authSource=admin
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 512M } } }

  fetcher-metals:
    <<: *svc-common
    build: { context: ., dockerfile: apps/fetcher-metals/Dockerfile, target: run }
    container_name: gold-tracker-fetcher-metals
    environment: { <<: *rabbit-env }
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 256M } } }

  fetcher-estjt:
    <<: *svc-common
    build: { context: ., dockerfile: apps/fetcher-estjt/Dockerfile, target: run }
    container_name: gold-tracker-fetcher-estjt
    environment: { <<: *rabbit-env }
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 256M } } }

  web-api:
    <<: *svc-common
    build: { context: ., dockerfile: apps/web-api/Dockerfile, target: run }
    container_name: gold-tracker-web-api
    environment:
      <<: *rabbit-env
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 512M } } }

  telegram-bot:
    <<: *svc-common
    build: { context: ., dockerfile: apps/telegram-bot/Dockerfile, target: run }
    container_name: gold-tracker-telegram-bot
    environment:
      <<: *rabbit-env
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/gold-tracker?authSource=admin
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 384M } } }

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: gold-tracker-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    depends_on: [web-api]
    networks: [gold-network]
    deploy: { resources: { limits: { memory: 256M } } }

  nginx:
    image: nginx:1.25-alpine
    container_name: gold-tracker-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on: [web-api, frontend]
    networks: [gold-network]

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  gold-network:
    driver: bridge
