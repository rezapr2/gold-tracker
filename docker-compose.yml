version: '3.9'

# Microservices topology:
#   fetcher-metals / fetcher-estjt --price.fetched--> core --price.saved/alert--> web-api + telegram-bot
# Core owns MongoDB (writes + read RPC); the others reach data over RabbitMQ.
# A root .env supplies secrets (API keys, telegram tokens, JWT/admin) to the
# services that need them.

x-rabbit-env: &rabbit-env
  RABBITMQ_URL: amqp://rabbitmq:5672

services:
  mongodb:
    image: mongo:7-jammy
    container_name: gold-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gold-tracker
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gold-network]

  redis:
    image: redis:7-alpine
    container_name: gold-tracker-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [gold-network]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: gold-tracker-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [gold-network]

  core:
    build: { context: ., dockerfile: apps/core/Dockerfile }
    container_name: gold-tracker-core
    restart: unless-stopped
    env_file: [.env]
    environment:
      <<: *rabbit-env
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/gold-tracker
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [gold-network]

  fetcher-metals:
    build: { context: ., dockerfile: apps/fetcher-metals/Dockerfile }
    container_name: gold-tracker-fetcher-metals
    restart: unless-stopped
    env_file: [.env]
    environment:
      <<: *rabbit-env
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [gold-network]

  fetcher-estjt:
    build: { context: ., dockerfile: apps/fetcher-estjt/Dockerfile }
    container_name: gold-tracker-fetcher-estjt
    restart: unless-stopped
    env_file: [.env]
    environment:
      <<: *rabbit-env
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [gold-network]

  web-api:
    build: { context: ., dockerfile: apps/web-api/Dockerfile }
    container_name: gold-tracker-web-api
    restart: unless-stopped
    env_file: [.env]
    environment:
      <<: *rabbit-env
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://localhost:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [gold-network]

  telegram-bot:
    build: { context: ., dockerfile: apps/telegram-bot/Dockerfile }
    container_name: gold-tracker-telegram-bot
    restart: unless-stopped
    env_file: [.env]
    environment:
      <<: *rabbit-env
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/gold-tracker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [gold-network]

  frontend:
    build: { context: ./apps/frontend, dockerfile: Dockerfile }
    container_name: gold-tracker-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - web-api
    networks: [gold-network]

  nginx:
    image: nginx:1.25-alpine
    container_name: gold-tracker-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-api
      - frontend
    networks: [gold-network]

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  gold-network:
    driver: bridge
