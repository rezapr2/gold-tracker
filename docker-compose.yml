version: '3.9'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: gold-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gold-tracker
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gold-network

  redis:
    image: redis:7-alpine
    container_name: gold-tracker-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gold-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: gold-tracker-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/gold-tracker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://localhost:3001/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./apps/backend/src:/app/src
      - backend_logs:/app/logs
    networks:
      - gold-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: gold-tracker-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - gold-network

  nginx:
    image: nginx:1.25-alpine
    container_name: gold-tracker-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gold-network

volumes:
  mongo_data:
  redis_data:
  backend_logs:

networks:
  gold-network:
    driver: bridge
